name: padizdoctor
description: "A new Flutter project."

# Prevent accidental publishing to pub.dev.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  firebase_core: ^4.2.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  sidebarx: ^0.17.2
  shared_preferences: ^2.2.2
  image_picker: ^1.1.2
  camera: ^0.11.2
  path_provider: ^2.1.5
  path: ^1.9.0
  firebase_auth: ^6.1.3
  google_sign_in: ^7.2.0
  cloud_firestore: ^6.1.1
  blur_detection: ^1.0.0
  google_fonts: ^6.3.3
  cached_network_image: ^3.4.1
  fl_chart: ^1.1.1
  get_it: ^9.2.0
  cloudinary_api: ^1.1.1
  cloudinary_url_gen: ^1.8.0
  fluentui_system_icons: ^1.1.273
  provider: ^6.1.5+1
  http: ^1.6.0
  file_picker: ^10.3.8
  image_cropper: ^11.0.0
  photo_manager: ^3.3.0
  rxdart: ^0.28.0
  image_size_getter: ^2.4.1
  image: ^4.1.3
  firebase_storage: ^13.3.0
  table_calendar: ^3.1.2
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  intl: any
  pdf: ^3.11.1
  printing: ^5.13.2
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo2.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo2.png"

flutter:
  uses-material-design: true
  # Enable generation of localized Strings from arb files.
  generate: true
  
  fonts:
      - family: Poppins
        fonts:
          - asset: assets/fonts/Poppins-Regular.ttf
          - asset: assets/fonts/Poppins-Bold.ttf
            weight: 700
          - asset: assets/fonts/Poppins-SemiBold.ttf
            weight: 600
  

  assets:
    # Add assets from the images directory to the application.
    - assets/images/

  